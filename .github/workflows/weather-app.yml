name: WeatherEye CI/CD Pipeline - Full Command Support

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      command_group:
        description: '📋 Группа команд'
        required: true
        default: 'weather'
        type: choice
        options:
          - weather
          - favorites
          - settings
          - full_demo
      weather_command:
        description: '🌤️ Команда погоды'
        required: false
        default: 'now'
        type: choice
        options:
          - now
          - forecast
      city:
        description: '🏙️ Город'
        required: false
        default: 'Moscow'
        type: string
      forecast_days:
        description: '📅 Дней для прогноза'
        required: false
        default: '3'
        type: string
      favorites_action:
        description: '⭐ Действие с избранным'
        required: false
        default: 'list'
        type: choice
        options:
          - list
          - add
          - remove
      favorites_city:
        description: '🏙️ Город для избранного'
        required: false
        default: 'Moscow'
        type: string
      settings_action:
        description: '⚙️ Действие с настройками'
        required: false
        default: 'show'
        type: choice
        options:
          - show
          - units
      units_value:
        description: '🌡️ Единицы измерения'
        required: false
        default: 'C'
        type: choice
        options:
          - C
          - F
  schedule:
    - cron: '0 */6 * * *'

jobs:
  # Новый job: загрузка сохраненного избранного
  load_favorites:
    name: Load Saved Favorites
    runs-on: ubuntu-latest
    outputs:
      favorites_exist: ${{ steps.check.outputs.favorites_exist }}
    steps:
      - name: Download previously saved favorites
        uses: actions/download-artifact@v4
        continue-on-error: true
        id: download
        with:
          name: weathereye-favorites
          path: ~/.weathereye/
      
      - name: Check if favorites exist
        id: check
        run: |
          if [ -f ~/.weathereye/favorites.json ]; then
            echo "favorites_exist=true" >> $GITHUB_OUTPUT
            echo "✅ Found existing favorites"
            cat ~/.wearetheye/favorites.json
          else
            echo "favorites_exist=false" >> $GITHUB_OUTPUT
            echo "📭 No existing favorites found, starting fresh"
          fi

  command_executor:
    name: Execute Commands
    runs-on: ubuntu-latest
    needs: load_favorites
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    - name: Download saved favorites
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: weathereye-favorites
        path: ~/.weathereye/
    
    - name: Show current favorites before execution
      run: |
        echo "📋 Favorites before execution:"
        if [ -f ~/.weathereye/favorites.json ]; then
          cat ~/.weathereye/favorites.json
        else
          echo "No favorites file yet"
        fi
    
    - name: Execute Commands
      run: |
        echo "WeatherEye Command Executor"
        echo "==========================="
        
        COMMAND_GROUP="${{ github.event.inputs.command_group }}"
        UNITS="${{ github.event.inputs.units_value }}"
        
        # Устанавливаем единицы измерения
        if [ "$UNITS" != "" ] && [ "$UNITS" != "C" ]; then
          echo "🔧 Setting units to $UNITS"
          python weather.py settings units "$UNITS"
          echo ""
        fi
        
        if [ "$COMMAND_GROUP" = "weather" ]; then
          CITY="${{ github.event.inputs.city }}"
          WEATHER_CMD="${{ github.event.inputs.weather_command }}"
          DAYS="${{ github.event.inputs.forecast_days }}"
          
          echo "🌤️ Weather Commands"
          echo "==================="
          echo "City: $CITY"
          echo "Command: $WEATHER_CMD"
          echo "Days: $DAYS"
          echo ""
          
          if [ "$WEATHER_CMD" = "now" ]; then
            python weather.py now "$CITY"
          else
            python weather.py forecast "$CITY" --days "$DAYS"
          fi
          
        elif [ "$COMMAND_GROUP" = "favorites" ]; then
          FAV_ACTION="${{ github.event.inputs.favorites_action }}"
          FAV_CITY="${{ github.event.inputs.favorites_city }}"
          
          echo "⭐ Favorites Commands"
          echo "===================="
          echo "Action: $FAV_ACTION"
          echo "City: $FAV_CITY"
          echo ""
          
          # Показываем текущее избранное ДО выполнения
          echo "Current favorites:"
          python weather.py favorites list
          echo ""
          
          if [ "$FAV_ACTION" = "list" ]; then
            python weather.py favorites list
          elif [ "$FAV_ACTION" = "add" ]; then
            python weather.py favorites add "$FAV_CITY"
            echo "✅ Added $FAV_CITY"
            echo ""
            echo "Updated favorites:"
            python weather.py favorites list
          else
            python weather.py favorites remove "$FAV_CITY"
            echo "🗑️ Removed $FAV_CITY"
            echo ""
            echo "Updated favorites:"
            python weather.py favorites list
          fi
          
        elif [ "$COMMAND_GROUP" = "settings" ]; then
          SETTINGS_ACTION="${{ github.event.inputs.settings_action }}"
          UNITS="${{ github.event.inputs.units_value }}"
          
          echo "⚙️ Settings Commands"
          echo "===================="
          echo "Action: $SETTINGS_ACTION"
          echo ""
          
          if [ "$SETTINGS_ACTION" = "show" ]; then
            python weather.py settings show
          else
            python weather.py settings units "$UNITS"
            python weather.py settings show
          fi
          
        elif [ "$COMMAND_GROUP" = "full_demo" ]; then
          echo "🎭 Full Demo"
          echo "============"
          echo ""
          
          CITY="${{ github.event.inputs.city }}"
          WEATHER_CMD="${{ github.event.inputs.weather_command }}"
          DAYS="${{ github.event.inputs.forecast_days }}"
          FAV_ACTION="${{ github.event.inputs.favorites_action }}"
          FAV_CITY="${{ github.event.inputs.favorites_city }}"
          UNITS="${{ github.event.inputs.units_value }}"
          
          echo "📋 Demo Configuration:"
          echo "  • City: $CITY"
          echo "  • Weather command: $WEATHER_CMD"
          echo "  • Forecast days: $DAYS"
          echo "  • Units: $UNITS"
          echo "  • Favorites action: $FAV_ACTION"
          echo "  • Favorites city: $FAV_CITY"
          echo ""
          
          # 1. Weather Demo
          echo "1. 🌤️ Weather Demo"
          echo "------------------"
          if [ "$WEATHER_CMD" = "now" ]; then
            python weather.py now "$CITY"
          else
            python weather.py forecast "$CITY" --days "$DAYS"
          fi
          echo ""
          
          # 2. Favorites Demo
          echo "2. ⭐ Favorites Demo"
          echo "-------------------"
          echo "Current favorites:"
          python weather.py favorites list
          echo ""
          
          if [ "$FAV_ACTION" = "list" ]; then
            python weather.py favorites list
          elif [ "$FAV_ACTION" = "add" ]; then
            python weather.py favorites add "$FAV_CITY"
            echo "Updated favorites:"
            python weather.py favorites list
          else
            python weather.py favorites remove "$FAV_CITY"
            echo "Updated favorites:"
            python weather.py favorites list
          fi
          echo ""
          
          # 3. Settings Demo
          echo "3. ⚙️ Settings Demo"
          echo "------------------"
          python weather.py settings show
          if [ "$UNITS" != "" ] && [ "$UNITS" != "C" ]; then
            python weather.py settings units "$UNITS"
            python weather.py settings show
          fi
        fi
      env:
        PYTHONIOENCODING: utf-8
    
    - name: Save favorites for next run
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: weathereye-favorites
        path: ~/.weathereye/
        retention-days: 90
        if-no-files-found: ignore

  demo:
    name: Demo Run
    runs-on: ubuntu-latest
    needs: load_favorites
    if: github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    - name: Download saved favorites
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: weathereye-favorites
        path: ~/.weathereye/
    
    - name: Show loaded favorites
      run: |
        echo "📋 Loaded favorites:"
        if [ -f ~/.weathereye/favorites.json ]; then
          cat ~/.weathereye/favorites.json
        else
          echo "No favorites file yet"
        fi
        echo ""
    
    - name: Run Demo with User Settings
      run: |
        echo "🌍 WeatherEye Demo Run"
        echo "======================"
        echo "Trigger: ${{ github.event_name }}"
        echo ""
        
        # Получаем все настройки пользователя
        CITY="${{ github.event.inputs.city }}"
        WEATHER_CMD="${{ github.event.inputs.weather_command }}"
        DAYS="${{ github.event.inputs.forecast_days }}"
        UNITS="${{ github.event.inputs.units_value }}"
        
        echo "📋 Your Settings:"
        echo "  • City: $CITY"
        echo "  • Weather command: $WEATHER_CMD"
        echo "  • Forecast days: $DAYS"
        echo "  • Units: $UNITS"
        echo ""
        
        # Устанавливаем единицы измерения
        if [ "$UNITS" != "" ] && [ "$UNITS" != "C" ]; then
          echo "🔧 Setting units to $UNITS"
          python weather.py settings units "$UNITS"
          echo ""
        fi
        
        # Показываем текущие настройки
        echo "Current settings:"
        python weather.py settings show
        echo ""
        
        # Показываем избранное (загруженное из предыдущих запусков)
        echo "⭐ Current favorites (from previous runs):"
        python weather.py favorites list
        echo ""
        
        # Выполняем выбранную команду погоды
        echo "📌 Your Request: $CITY"
        echo "-------------------"
        if [ "$WEATHER_CMD" = "now" ]; then
          python weather.py now "$CITY"
        else
          python weather.py forecast "$CITY" --days "$DAYS"
        fi
        echo ""
        
        # Дополнительные города для демо
        echo "📌 Additional Cities"
        echo "-------------------"
        python weather.py now Moscow
        python weather.py now London
        echo ""
        
        # Прогноз с выбранным количеством дней
        echo "📅 Forecast ($DAYS days)"
        echo "-------------------"
        python weather.py forecast Moscow --days "$DAYS"
      env:
        PYTHONIOENCODING: utf-8
    
    - name: Save favorites for next run
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: weathereye-favorites
        path: ~/.weathereye/
        retention-days: 90
        if-no-files-found: ignore

  validate:
    name: Validate Commands
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    - name: Validate
      run: |
        echo "🔍 Validating commands..."
        python weather.py --help > /dev/null && echo "✅ Help OK"
        python weather.py now Moscow > /dev/null && echo "✅ Now OK" 
        python weather.py forecast Moscow --days 3 > /dev/null && echo "✅ Forecast OK"
        python weather.py favorites list > /dev/null && echo "✅ Favorites OK"
        python weather.py settings show > /dev/null && echo "✅ Settings OK"
        echo "✅ All commands validated"
      env:
        PYTHONIOENCODING: utf-8
