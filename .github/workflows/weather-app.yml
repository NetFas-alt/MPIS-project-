name: WeatherEye CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pytest pytest-cov flake8 black mypy
    
    - name: Lint with flake8
      run: |
        flake8 weather.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 weather.py --count --exit-zero --max-complexity=10 --statistics
      continue-on-error: true
    
    - name: Run unit tests
      run: |
        python -c "
import unittest
import sys
sys.path.append('.')
from weather import format_temperature, format_wind, AppSettings, CityNotFoundError, ErrorType

class TestWeatherApp(unittest.TestCase):
    def test_temperature_conversion(self):
        self.assertEqual(format_temperature(0, 'F'), '32°F')
        self.assertEqual(format_temperature(100, 'F'), '212°F')
        self.assertEqual(format_temperature(25, 'C'), '25°C')
    
    def test_settings_validation(self):
        settings = AppSettings(units='C')
        settings.validate()
        settings = AppSettings(units='F')
        settings.validate()
        with self.assertRaises(ValueError):
            AppSettings(units='K').validate()
    
    def test_wind_format(self):
        self.assertEqual(format_wind(5.0), '5.0 м/с')
        self.assertEqual(format_wind(3.333), '3.3 м/с')
    
    def test_error_types(self):
        err = CityNotFoundError('Moscow')
        self.assertEqual(err.error_type, ErrorType.NOT_FOUND)
        self.assertIn('Moscow', str(err))

if __name__ == '__main__':
    unittest.main(verbosity=2)
"
    
    - name: Test weather API for Moscow
      run: python weather.py now Moscow
      continue-on-error: true
    
    - name: Test weather API for London
      run: python weather.py forecast London --days 3
      continue-on-error: true

  demo:
    name: Live Demo Run
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Demo - Current Weather in Multiple Cities
      run: |
        echo "🌍 WeatherEye Demo Run"
        echo "======================"
        echo ""
        
        echo "📌 Moscow"
        echo "-------------------"
        python weather.py now Moscow || echo "❌ Failed to get weather for Moscow"
        echo ""
        
        echo "📌 London"
        echo "-------------------"
        python weather.py now London || echo "❌ Failed to get weather for London"
        echo ""
        
        echo "📌 Tokyo"
        echo "-------------------"
        python weather.py now Tokyo || echo "❌ Failed to get weather for Tokyo"
        echo ""
    
    - name: Demo - 5-day Forecast
      run: |
        echo "📅 5-Day Forecast for Moscow"
        echo "==========================="
        python weather.py forecast Moscow --days 5
    
    - name: Demo - Favorites Management
      run: |
        echo "⭐ Favorites Management Demo"
        echo "=========================="
        python weather.py favorites add Moscow
        python weather.py favorites add London
        python weather.py favorites add Tokyo
        python weather.py favorites list
        python weather.py favorites remove London
        python weather.py favorites list
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: weather-demo-output
        path: |
          ~/.weathereye/
        if-no-files-found: ignore

  compatibility:
    name: Compatibility Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Test with minimal dependencies
      run: |
        python -c "import requests; print(f'✅ Requests version: {requests.__version__}')"
        python weather.py --help
    
    - name: Check file structure
      run: |
        echo "📁 Repository structure:"
        ls -la
        echo ""
        echo "📄 Weather.py exists: $([ -f weather.py ] && echo '✅' || echo '❌')"

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [test, demo, compatibility]
    if: always()
    
    steps:
    - name: Display status
      run: |
        echo "===================="
        echo "WeatherEye Pipeline Status"
        echo "===================="
        echo "Test: ${{ needs.test.result }}"
        echo "Demo: ${{ needs.demo.result }}"
        echo "Compatibility: ${{ needs.compatibility.result }}"
        echo "===================="
        
        if [[ "${{ needs.test.result }}" == "success" ]] && \
           [[ "${{ needs.demo.result }}" == "success" || "${{ needs.demo.result }}" == "skipped" ]] && \
           [[ "${{ needs.compatibility.result }}" == "success" ]]; then
          echo "✅ Все тесты пройдены успешно!"
        else
          echo "❌ Некоторые тесты завершились с ошибкой"
        fi
