name: WeatherEye CI/CD Pipeline - Full Command Support

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      command_group:
        description: '📋 Группа команд'
        required: true
        default: 'weather'
        type: choice
        options:
          - weather
          - favorites
          - settings
          - full_demo
      weather_command:
        description: '🌤️ Команда погоды'
        required: false
        default: 'now'
        type: choice
        options:
          - now
          - forecast
      city:
        description: '🏙️ Город'
        required: false
        default: 'Moscow'
        type: string
      forecast_days:
        description: '📅 Дней для прогноза'
        required: false
        default: '3'
        type: string
      favorites_action:
        description: '⭐ Действие с избранным'
        required: false
        default: 'list'
        type: choice
        options:
          - list
          - add
          - remove
      favorites_city:
        description: '🏙️ Город для избранного'
        required: false
        default: 'Moscow'
        type: string
      settings_action:
        description: '⚙️ Действие с настройками'
        required: false
        default: 'show'
        type: choice
        options:
          - show
          - units
      units_value:
        description: '🌡️ Единицы измерения'
        required: false
        default: 'C'
        type: choice
        options:
          - C
          - F
  schedule:
    - cron: '0 */6 * * *'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
      shell: bash
    
    - name: Run unit tests
      run: python -m unittest discover -v
      continue-on-error: true

  command_executor:
    name: Execute Commands
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    - name: Execute Commands
      run: |
        echo "WeatherEye Command Executor"
        echo "==========================="
        
        COMMAND_GROUP="${{ github.event.inputs.command_group }}"
        UNITS="${{ github.event.inputs.units_value }}"
        
        # Устанавливаем единицы измерения, если выбраны
        if [ "$UNITS" != "" ] && [ "$UNITS" != "C" ]; then
          echo "🔧 Setting units to $UNITS"
          python weather.py settings units "$UNITS"
          echo ""
        fi
        
        if [ "$COMMAND_GROUP" = "weather" ]; then
          CITY="${{ github.event.inputs.city }}"
          WEATHER_CMD="${{ github.event.inputs.weather_command }}"
          DAYS="${{ github.event.inputs.forecast_days }}"
          
          echo "🌤️ Weather Commands"
          echo "==================="
          echo "City: $CITY"
          echo "Command: $WEATHER_CMD"
          echo "Days: $DAYS"
          echo ""
          
          if [ "$WEATHER_CMD" = "now" ]; then
            python weather.py now "$CITY"
          else
            python weather.py forecast "$CITY" --days "$DAYS"
          fi
          
        elif [ "$COMMAND_GROUP" = "favorites" ]; then
          FAV_ACTION="${{ github.event.inputs.favorites_action }}"
          FAV_CITY="${{ github.event.inputs.favorites_city }}"
          
          echo "⭐ Favorites Commands"
          echo "===================="
          echo "Action: $FAV_ACTION"
          echo "City: $FAV_CITY"
          echo ""
          
          if [ "$FAV_ACTION" = "list" ]; then
            python weather.py favorites list
          elif [ "$FAV_ACTION" = "add" ]; then
            python weather.py favorites add "$FAV_CITY"
            python weather.py favorites list
          else
            python weather.py favorites remove "$FAV_CITY"
            python weather.py favorites list
          fi
          
        elif [ "$COMMAND_GROUP" = "settings" ]; then
          SETTINGS_ACTION="${{ github.event.inputs.settings_action }}"
          UNITS="${{ github.event.inputs.units_value }}"
          
          echo "⚙️ Settings Commands"
          echo "===================="
          echo "Action: $SETTINGS_ACTION"
          echo ""
          
          if [ "$SETTINGS_ACTION" = "show" ]; then
            python weather.py settings show
          else
            python weather.py settings units "$UNITS"
            python weather.py settings show
          fi
          
        elif [ "$COMMAND_GROUP" = "full_demo" ]; then
          echo "🎭 Full Demo"
          echo "============"
          echo ""
          
          CITY="${{ github.event.inputs.city }}"
          WEATHER_CMD="${{ github.event.inputs.weather_command }}"
          DAYS="${{ github.event.inputs.forecast_days }}"
          FAV_ACTION="${{ github.event.inputs.favorites_action }}"
          FAV_CITY="${{ github.event.inputs.favorites_city }}"
          UNITS="${{ github.event.inputs.units_value }}"
          
          echo "📋 Demo Configuration:"
          echo "  • City: $CITY"
          echo "  • Weather command: $WEATHER_CMD"
          echo "  • Forecast days: $DAYS"
          echo "  • Units: $UNITS"
          echo "  • Favorites action: $FAV_ACTION"
          echo "  • Favorites city: $FAV_CITY"
          echo ""
          
          # 1. Weather Demo
          echo "1. 🌤️ Weather Demo"
          echo "------------------"
          if [ "$WEATHER_CMD" = "now" ]; then
            python weather.py now "$CITY"
          else
            python weather.py forecast "$CITY" --days "$DAYS"
          fi
          echo ""
          
          # 2. Favorites Demo
          echo "2. ⭐ Favorites Demo"
          echo "-------------------"
          if [ "$FAV_ACTION" = "list" ]; then
            python weather.py favorites list
          elif [ "$FAV_ACTION" = "add" ]; then
            python weather.py favorites add "$FAV_CITY"
            python weather.py favorites list
          else
            python weather.py favorites remove "$FAV_CITY"
            python weather.py favorites list
          fi
          echo ""
          
          # 3. Settings Demo
          echo "3. ⚙️ Settings Demo"
          echo "------------------"
          python weather.py settings show
          if [ "$UNITS" != "" ] && [ "$UNITS" != "C" ]; then
            python weather.py settings units "$UNITS"
            python weather.py settings show
          fi
        fi
      env:
        PYTHONIOENCODING: utf-8

  demo:
    name: Demo Run
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    - name: Run Demo with User Settings
      run: |
        echo "🌍 WeatherEye Demo Run"
        echo "======================"
        echo "Trigger: ${{ github.event_name }}"
        echo ""
        
        # Получаем все настройки пользователя
        CITY="${{ github.event.inputs.city }}"
        WEATHER_CMD="${{ github.event.inputs.weather_command }}"
        DAYS="${{ github.event.inputs.forecast_days }}"
        UNITS="${{ github.event.inputs.units_value }}"
        
        echo "📋 Your Settings:"
        echo "  • City: $CITY"
        echo "  • Weather command: $WEATHER_CMD"
        echo "  • Forecast days: $DAYS"
        echo "  • Units: $UNITS"
        echo ""
        
        # Устанавливаем единицы измерения
        if [ "$UNITS" != "" ] && [ "$UNITS" != "C" ]; then
          echo "🔧 Setting units to $UNITS"
          python weather.py settings units "$UNITS"
          echo ""
        fi
        
        # Показываем текущие настройки
        echo "Current settings:"
        python weather.py settings show
        echo ""
        
        # Выполняем выбранную команду погоды
        echo "📌 Your Request: $CITY"
        echo "-------------------"
        if [ "$WEATHER_CMD" = "now" ]; then
          python weather.py now "$CITY"
        else
          python weather.py forecast "$CITY" --days "$DAYS"
        fi
        echo ""
        
        # Дополнительные города для демо
        echo "📌 Additional Cities"
        echo "-------------------"
        python weather.py now Moscow
        python weather.py now London
        echo ""
        
        # Прогноз с выбранным количеством дней
        echo "📅 Forecast ($DAYS days)"
        echo "-------------------"
        python weather.py forecast Moscow --days "$DAYS"
      env:
        PYTHONIOENCODING: utf-8

  validate:
    name: Validate Commands
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    - name: Validate
      run: |
        echo "🔍 Validating commands..."
        python weather.py --help > /dev/null && echo "✅ Help OK"
        python weather.py now Moscow > /dev/null && echo "✅ Now OK" 
        python weather.py forecast Moscow --days 3 > /dev/null && echo "✅ Forecast OK"
        python weather.py favorites list > /dev/null && echo "✅ Favorites OK"
        python weather.py settings show > /dev/null && echo "✅ Settings OK"
        echo "✅ All commands validated"
      env:
        PYTHONIOENCODING: utf-8
