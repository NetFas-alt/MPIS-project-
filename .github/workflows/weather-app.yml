name: WeatherEye CI/CD Pipeline - Full Command Support

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      command_group:
        description: '📋 Группа команд'
        required: true
        default: 'full_demo'
        type: choice
        options:
          - weather
          - favorites
          - settings
          - full_demo
      weather_command:
        description: '🌤️ Команда погоды'
        required: false
        default: 'now'
        type: choice
        options:
          - now
          - forecast
      city:
        description: '🏙️ Город'
        required: false
        default: 'Moscow'
        type: string
      forecast_days:
        description: '📅 Дней для прогноза (1-16)'
        required: false
        default: '3'
        type: string
      favorites_action:
        description: '⭐ Действие с избранным'
        required: false
        default: 'list'
        type: choice
        options:
          - list
          - add
          - remove
      favorites_city:
        description: '🏙️ Город для избранного'
        required: false
        default: 'Moscow'
        type: string
      settings_action:
        description: '⚙️ Действие с настройками'
        required: false
        default: 'show'
        type: choice
        options:
          - show
          - units
      units_value:
        description: '🌡️ Единицы измерения'
        required: false
        default: 'C'
        type: choice
        options:
          - C
          - F
  schedule:
    - cron: '0 */6 * * *'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
      shell: bash
    
    - name: Run unit tests
      run: python -m unittest discover -v
      continue-on-error: true

  weather_app:
    name: WeatherEye App Runner
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    # СОЗДАЕМ ДИРЕКТОРИЮ ДЛЯ ИЗБРАННОГО
    - name: Create favorites directory
      run: |
        echo "📁 Creating directory: ~/.weathereye/"
        mkdir -p ~/.weathereye/
        echo "✅ Directory created"
    
    # ЗАГРУЖАЕМ СОХРАНЕННОЕ ИЗБРАННОЕ
    - name: Download saved favorites
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: weathereye-favorites
        path: ~/.weathereye/
    
    # ИНИЦИАЛИЗИРУЕМ ИЗБРАННОЕ
    - name: Initialize favorites
      run: |
        echo "📁 Checking favorites file..."
        if [ -f ~/.weathereye/favorites.json ]; then
          echo "✅ Found existing favorites file"
          echo "Content:"
          cat ~/.weathereye/favorites.json
        else
          echo "📭 No favorites file found, creating empty one"
          echo '{"cities": []}' > ~/.weathereye/favorites.json
          echo "✅ Created empty favorites file"
        fi
        echo ""
    
    # УСТАНАВЛИВАЕМ ПАРАМЕТРЫ В ОКРУЖЕНИЕ С ПРАВИЛЬНОЙ ОБРАБОТКОЙ
    - name: Set parameters
      run: |
        # Получаем значения
        DAYS_RAW="${{ github.event.inputs.forecast_days }}"
        CITY="${{ github.event.inputs.city }}"
        UNITS="${{ github.event.inputs.units_value }}"
        WEATHER_CMD="${{ github.event.inputs.weather_command }}"
        FAV_ACTION="${{ github.event.inputs.favorites_action }}"
        FAV_CITY="${{ github.event.inputs.favorites_city }}"
        COMMAND_GROUP="${{ github.event.inputs.command_group }}"
        SETTINGS_ACTION="${{ github.event.inputs.settings_action }}"
        
        # ИСПРАВЛЕНИЕ: Правильная обработка дней
        # Убираем кавычки и пробелы
        DAYS_RAW=$(echo "$DAYS_RAW" | tr -d '"' | xargs)
        
        # Проверяем, что это число
        if [[ "$DAYS_RAW" =~ ^[0-9]+$ ]]; then
            DAYS=$DAYS_RAW
        else
            DAYS=3
            echo "⚠️ Некорректное значение дней '$DAYS_RAW', используется 3"
        fi
        
        # Ограничиваем разумными значениями
        if [ "$DAYS" -lt 1 ]; then
            DAYS=1
            echo "⚠️ Минимальное количество дней - 1"
        elif [ "$DAYS" -gt 16 ]; then
            DAYS=16
            echo "⚠️ Максимальное количество дней - 16"
        fi
        
        # Сохраняем в окружение
        echo "DAYS=$DAYS" >> $GITHUB_ENV
        echo "CITY=$CITY" >> $GITHUB_ENV
        echo "UNITS=$UNITS" >> $GITHUB_ENV
        echo "WEATHER_CMD=$WEATHER_CMD" >> $GITHUB_ENV
        echo "FAV_ACTION=$FAV_ACTION" >> $GITHUB_ENV
        echo "FAV_CITY=$FAV_CITY" >> $GITHUB_ENV
        echo "COMMAND_GROUP=$COMMAND_GROUP" >> $GITHUB_ENV
        echo "SETTINGS_ACTION=$SETTINGS_ACTION" >> $GITHUB_ENV
        
        echo "✅ Параметры установлены: DAYS=$DAYS"
    
    # УСТАНАВЛИВАЕМ ЕДИНИЦЫ ИЗМЕРЕНИЯ
    - name: Set units
      run: |
        if [ "$UNITS" != "" ] && [ "$UNITS" != "C" ]; then
          echo "🔧 Setting units to $UNITS"
          python weather.py settings units "$UNITS"
          echo "✅ Units set to $UNITS"
        else
          echo "✅ Using default units (Celsius)"
        fi
    
    # ПОКАЗЫВАЕМ ТЕКУЩЕЕ СОСТОЯНИЕ
    - name: Show current state
      run: |
        echo "╔════════════════════════════════════╗"
        echo "║        CURRENT STATE               ║"
        echo "╚════════════════════════════════════╝"
        echo ""
        echo "📊 Workflow Information:"
        echo "  • Event: ${{ github.event_name }}"
        echo "  • Command group: $COMMAND_GROUP"
        echo "  • Weather command: $WEATHER_CMD"
        echo "  • City: $CITY"
        echo "  • Forecast days: $DAYS"
        echo "  • Units: $UNITS"
        echo "  • Favorites action: $FAV_ACTION"
        echo "  • Favorites city: $FAV_CITY"
        echo "  • Settings action: $SETTINGS_ACTION"
        echo ""
        echo "⚙️ Current settings:"
        python weather.py settings show
        echo ""
        echo "⭐ Current favorites:"
        python weather.py favorites list
    
    # ========== РЕЖИМ 1: AUTO DEMO (ДЛЯ PUSH/SCHEDULE) ==========
    - name: Auto Demo Mode
      if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule'
      run: |
        echo ""
        echo "╔════════════════════════════════════╗"
        echo "║        AUTO DEMO MODE               ║"
        echo "╚════════════════════════════════════╝"
        echo ""
        
        echo "📅 Using forecast days: $DAYS"
        echo ""
        
        echo "1. 🌤️ CURRENT WEATHER"
        echo "----------------------"
        python weather.py now Moscow
        python weather.py now London
        echo ""
        
        echo "2. 📅 FORECAST ($DAYS days)"
        echo "---------------------------"
        python weather.py forecast Moscow --days "$DAYS"
        python weather.py forecast London --days "$DAYS"
        echo ""
        
        echo "3. ⭐ FAVORITES DEMO"
        echo "--------------------"
        echo "Favorites before:"
        python weather.py favorites list
        echo ""
        echo "Adding Moscow to favorites..."
        python weather.py favorites add Moscow
        echo "Favorites after:"
        python weather.py favorites list
    
    # ========== РЕЖИМ 2: РУЧНОЙ ЗАПУСК (ДЛЯ WORKFLOW_DISPATCH) ==========
    - name: Manual Mode
      if: github.event_name == 'workflow_dispatch'
      run: |
        echo ""
        echo "╔════════════════════════════════════╗"
        echo "║        MANUAL MODE                  ║"
        echo "╚════════════════════════════════════╝"
        echo ""
        
        echo "📅 Using forecast days: $DAYS"
        echo ""
        
        # ---------- WEATHER ----------
        if [ "$COMMAND_GROUP" = "weather" ]; then
          echo "🌤️ WEATHER COMMAND"
          echo "=================="
          echo "Command: $WEATHER_CMD"
          echo "City: $CITY"
          echo ""
          
          if [ "$WEATHER_CMD" = "now" ]; then
            python weather.py now "$CITY"
          else
            python weather.py forecast "$CITY" --days "$DAYS"
          fi
          
        # ---------- FAVORITES ----------
        elif [ "$COMMAND_GROUP" = "favorites" ]; then
          echo "⭐ FAVORITES COMMAND"
          echo "===================="
          echo "Action: $FAV_ACTION"
          echo "City: $FAV_CITY"
          echo ""
          
          echo "Favorites before:"
          python weather.py favorites list
          echo ""
          
          if [ "$FAV_ACTION" = "list" ]; then
            python weather.py favorites list
          elif [ "$FAV_ACTION" = "add" ]; then
            python weather.py favorites add "$FAV_CITY"
            echo ""
            echo "✅ Favorites after adding '$FAV_CITY':"
            python weather.py favorites list
          elif [ "$FAV_ACTION" = "remove" ]; then
            python weather.py favorites remove "$FAV_CITY"
            echo ""
            echo "✅ Favorites after removing '$FAV_CITY':"
            python weather.py favorites list
          fi
          
        # ---------- SETTINGS ----------
        elif [ "$COMMAND_GROUP" = "settings" ]; then
          echo "⚙️ SETTINGS COMMAND"
          echo "==================="
          echo "Action: $SETTINGS_ACTION"
          echo ""
          
          if [ "$SETTINGS_ACTION" = "show" ]; then
            python weather.py settings show
          else
            echo "Changing units to $UNITS..."
            python weather.py settings units "$UNITS"
            echo ""
            echo "✅ Settings after change:"
            python weather.py settings show
          fi
          
        # ---------- FULL DEMO ----------
elif [ "$COMMAND_GROUP" = "full_demo" ]; then
  echo "🎭 FULL DEMONSTRATION"
  echo "====================="
  echo ""
  
  # 1. WEATHER DEMO
  echo "1. 🌤️ WEATHER DEMO"
  echo "------------------"
  if [ "$WEATHER_CMD" = "now" ]; then
    python weather.py now "$CITY"
  else
    python weather.py forecast "$CITY" --days "$DAYS"
  fi
  echo ""
  
  # 2. FAVORITES DEMO
  echo "2. ⭐ FAVORITES DEMO"
  echo "-------------------"
  echo "Favorites before:"
  python weather.py favorites list
  echo ""
  
  if [ "$FAV_ACTION" = "add" ]; then
    python weather.py favorites add "$FAV_CITY"
    echo "✅ Favorites after adding '$FAV_CITY':"
    python weather.py favorites list
  elif [ "$FAV_ACTION" = "remove" ]; then
    python weather.py favorites remove "$FAV_CITY"
    echo "✅ Favorites after removing '$FAV_CITY':"
    python weather.py favorites list
  else
    python weather.py favorites list
  fi
  echo ""
  
  # 3. SETTINGS DEMO
  echo "3. ⚙️ SETTINGS DEMO"
  echo "------------------"
  python weather.py settings show
  if [ "$UNITS" != "" ] && [ "$UNITS" != "C" ]; then
    python weather.py settings units "$UNITS"
    echo ""
    echo "✅ Settings after change:"
    python weather.py settings show
  fi
  echo ""
  
  # 4. FORECAST DEMO
  echo "4. 📅 FORECAST DEMO ($DAYS days)"
  echo "--------------------------------"
  python weather.py forecast Moscow --days "$DAYS"
  python weather.py forecast "$CITY" --days "$DAYS"
  echo ""
  
  # 5. ADDITIONAL CITIES FROM FAVORITES (ИСПРАВЛЕНО)
  echo "5. 📋 ADDITIONAL CITIES FROM FAVORITES"
  echo "-------------------------------------"
  # Получаем список избранных городов
  FAVORITES_LIST=$(python weather.py favorites list | grep -o "'.*'" | tr -d "'" || echo "")
  
  if [ -z "$FAVORITES_LIST" ]; then
    echo "📭 Нет избранных городов для показа"
  else
    echo "Показываем погоду для городов из избранного:"
    echo "$FAVORITES_LIST" | while read fav_city; do
      if [ ! -z "$fav_city" ]; then
        echo ""
        echo "📌 $fav_city (из избранного)"
        python weather.py now "$fav_city"
      fi
    done
  fi
fi
    
    # СОХРАНЯЕМ ИЗБРАННОЕ С ДИАГНОСТИКОЙ
    - name: Save favorites to file
      run: |
        echo ""
        echo "💾 Saving favorites for next run..."
        echo "Current favorites list:"
        python weather.py favorites list
        echo ""
        echo "File content before save:"
        cat ~/.weathereye/favorites.json
        echo ""
        # Принудительно сохраняем через команду list (она читает файл)
        # и через add (она записывает файл) - для гарантии
        python weather.py favorites list > /dev/null
        echo "✅ Favorites saved"
        echo "File content after:"
        cat ~/.weathereye/favorites.json
    
    - name: Upload favorites artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: weathereye-favorites
        path: ~/.weathereye/
        retention-days: 90
        if-no-files-found: ignore
    
    - name: Final status
      if: always()
      run: |
        echo ""
        echo "╔════════════════════════════════════╗"
        echo "║        EXECUTION COMPLETE           ║"
        echo "╚════════════════════════════════════╝"
        echo "Event: ${{ github.event_name }}"
        echo "Status: ${{ job.status }}"

  validate:
    name: Validate Commands
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    - name: Quick validation
      run: |
        echo "🔍 Quick validation..."
        python weather.py --help > /dev/null && echo "✅ Help OK"
        python weather.py now Moscow > /dev/null && echo "✅ Now OK" 
        python weather.py forecast Moscow --days 3 > /dev/null && echo "✅ Forecast OK"
        echo "✅ All commands validated"
