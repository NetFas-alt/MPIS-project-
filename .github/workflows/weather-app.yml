name: WeatherEye CI/CD Pipeline - Full Command Support

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      command_group:
        description: '📋 Группа команд'
        required: true
        default: 'weather'
        type: choice
        options:
          - weather - Погода (now/forecast)
          - favorites - Избранное (add/list/remove)
          - settings - Настройки (show/units)
          - full_demo - Полная демонстрация
      weather_command:
        description: '🌤️ Команда погоды (для weather группы)'
        required: false
        default: 'now'
        type: choice
        options:
          - now
          - forecast
      city:
        description: '🏙️ Город'
        required: false
        default: 'Moscow'
        type: string
      forecast_days:
        description: '📅 Дней для прогноза (1-5)'
        required: false
        default: '3'
        type: string
      favorites_action:
        description: '⭐ Действие с избранным (для favorites группы)'
        required: false
        default: 'list'
        type: choice
        options:
          - list - Показать все
          - add - Добавить город
          - remove - Удалить город
      favorites_city:
        description: '🏙️ Город для избранного (add/remove)'
        required: false
        default: 'Moscow'
        type: string
      settings_action:
        description: '⚙️ Действие с настройками'
        required: false
        default: 'show'
        type: choice
        options:
          - show - Показать настройки
          - units - Сменить единицы
      units_value:
        description: '🌡️ Единицы измерения (C/F)'
        required: false
        default: 'C'
        type: choice
        options:
          - C
          - F
  schedule:
    - cron: '0 */6 * * *'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
      shell: bash
    
    - name: Run unit tests
      run: |
        python -c "
import unittest
import sys
sys.path.append('.')
from weather import format_temperature, format_wind, AppSettings, CityNotFoundError, ErrorType

class TestWeatherApp(unittest.TestCase):
    def test_temperature_conversion(self):
        self.assertEqual(format_temperature(0, 'F'), '32°F')
        self.assertEqual(format_temperature(100, 'F'), '212°F')
        self.assertEqual(format_temperature(25, 'C'), '25°C')
    
    def test_settings_validation(self):
        settings = AppSettings(units='C')
        settings.validate()
        settings = AppSettings(units='F')
        settings.validate()
        with self.assertRaises(ValueError):
            AppSettings(units='K').validate()
    
    def test_wind_format(self):
        self.assertEqual(format_wind(5.0), '5.0 м/с')
        self.assertEqual(format_wind(3.333), '3.3 м/с')
    
    def test_error_handling(self):
        err = CityNotFoundError('TestCity')
        self.assertEqual(err.error_type, ErrorType.NOT_FOUND)

if __name__ == '__main__':
    unittest.main(verbosity=2)
" || true

  command_executor:
    name: Execute Commands
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    - name: 🎯 Execute Selected Commands
      run: |
        echo "╔════════════════════════════════════╗"
        echo "║     WeatherEye Command Executor    ║"
        echo "╚════════════════════════════════════╝"
        echo ""
        
        COMMAND_GROUP="${{ github.event.inputs.command_group }}"
        
        # Функция для выполнения команд с обработкой ошибок
        run_cmd() {
          echo "▶️ Выполняю: $1"
          echo "──────────────────────────────────────"
          eval "$1" || echo "⚠️ Команда завершилась с ошибкой"
          echo ""
        }
        
        case "$COMMAND_GROUP" in
          "weather - Погода (now/forecast)")
            CITY="${{ github.event.inputs.city }}"
            WEATHER_CMD="${{ github.event.inputs.weather_command }}"
            DAYS="${{ github.event.inputs.forecast_days }}"
            
            echo "🌤️ ГРУППА: ПОГОДА"
            echo "=================="
            
            if [ "$WEATHER_CMD" == "now" ]; then
              run_cmd "python weather.py now \"$CITY\""
            else
              run_cmd "python weather.py forecast \"$CITY\" --days $DAYS"
            fi
            ;;
          
          "favorites - Избранное (add/list/remove)")
            FAV_ACTION="${{ github.event.inputs.favorites_action }}"
            FAV_CITY="${{ github.event.inputs.favorites_city }}"
            
            echo "⭐ ГРУППА: ИЗБРАННОЕ"
            echo "==================="
            
            case "$FAV_ACTION" in
              list*)
                run_cmd "python weather.py favorites list"
                ;;
              add*)
                run_cmd "python weather.py favorites add \"$FAV_CITY\""
                run_cmd "python weather.py favorites list"
                ;;
              remove*)
                run_cmd "python weather.py favorites remove \"$FAV_CITY\""
                run_cmd "python weather.py favorites list"
                ;;
            esac
            ;;
          
          "settings - Настройки (show/units)")
            SETTINGS_ACTION="${{ github.event.inputs.settings_action }}"
            UNITS="${{ github.event.inputs.units_value }}"
            
            echo "⚙️ ГРУППА: НАСТРОЙКИ"
            echo "===================="
            
            if [ "$SETTINGS_ACTION" == "show" ]; then
              run_cmd "python weather.py settings show"
            else
              run_cmd "python weather.py settings units $UNITS"
              run_cmd "python weather.py settings show"
            fi
            ;;
          
          "full_demo - Полная демонстрация")
            echo "🎭 ПОЛНАЯ ДЕМОНСТРАЦИЯ ВСЕХ КОМАНД"
            echo "==================================="
            
            # Weather commands
            echo "🌤️ ТЕКУЩАЯ ПОГОДА"
            echo "-------------------"
            run_cmd "python weather.py now Moscow"
            run_cmd "python weather.py now London"
            
            echo "📅 ПРОГНОЗ"
            echo "-------------------"
            run_cmd "python weather.py forecast Moscow --days 3"
            
            # Favorites commands
            echo "⭐ ИЗБРАННОЕ"
            echo "-------------------"
            run_cmd "python weather.py favorites list"
            run_cmd "python weather.py favorites add Moscow"
            run_cmd "python weather.py favorites add London"
            run_cmd "python weather.py favorites add Tokyo"
            run_cmd "python weather.py favorites list"
            run_cmd "python weather.py favorites remove London"
            run_cmd "python weather.py favorites list"
            
            # Settings commands
            echo "⚙️ НАСТРОЙКИ"
            echo "-------------------"
            run_cmd "python weather.py settings show"
            run_cmd "python weather.py settings units F"
            run_cmd "python weather.py settings show"
            run_cmd "python weather.py settings units C"
            
            # Help
            echo "📚 СПРАВКА"
            echo "-------------------"
            run_cmd "python weather.py --help"
            ;;
        esac
        
        echo ""
        echo "✅ Выполнение команд завершено"
    
    - name: Upload execution results
      uses: actions/upload-artifact@v4
      with:
        name: command-execution-results
        path: ~/.weathereye/
        if-no-files-found: ignore

  demo:
    name: Scheduled Demo Run
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'push'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    - name: 🌍 Scheduled Weather Demo
      run: |
        echo "🕐 Scheduled WeatherEye Demo"
        echo "============================"
        
        # Test current weather in major cities
        for city in Moscow London Tokyo "New York" Paris Berlin; do
          echo ""
          echo "📌 $city"
          echo "-------------------"
          python weather.py now "$city" || true
        done
        
        # Test forecast
        echo ""
        echo "📅 5-Day Forecast for Moscow"
        echo "-------------------"
        python weather.py forecast Moscow --days 5 || true
      env:
        PYTHONIOENCODING: utf-8

  validate:
    name: Validate All Commands
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    - name: ✅ Validate all commands
      run: |
        echo "🔍 VALIDATING ALL COMMANDS"
        echo "=========================="
        
        # Test help
        echo "📚 Testing --help"
        python weather.py --help > /dev/null && echo "  ✅ Help command works"
        
        # Test weather commands
        echo "🌤️ Testing weather commands"
        python weather.py now Moscow > /dev/null && echo "  ✅ weather now works"
        python weather.py forecast Moscow --days 3 > /dev/null && echo "  ✅ weather forecast works"
        
        # Test favorites commands
        echo "⭐ Testing favorites commands"
        python weather.py favorites list > /dev/null && echo "  ✅ favorites list works"
        python weather.py favorites add Moscow > /dev/null && echo "  ✅ favorites add works"
        python weather.py favorites remove Moscow > /dev/null && echo "  ✅ favorites remove works"
        
        # Test settings commands
        echo "⚙️ Testing settings commands"
        python weather.py settings show > /dev/null && echo "  ✅ settings show works"
        python weather.py settings units F > /dev/null && echo "  ✅ settings units works"
        
        echo ""
        echo "✅ All commands validated successfully"

  notify:
    name: Final Report
    runs-on: ubuntu-latest
    needs: [test, command_executor, demo, validate]
    if: always()
    
    steps:
    - name: Display comprehensive report
      run: |
        echo "╔════════════════════════════════════╗"
        echo "║     WeatherEye Final Report        ║"
        echo "╚════════════════════════════════════╝"
        echo ""
        echo "📊 JOB STATUSES:"
        echo "  Test: ${{ needs.test.result }}"
        echo "  Command Executor: ${{ needs.command_executor.result }}"
        echo "  Demo: ${{ needs.demo.result }}"
        echo "  Validate: ${{ needs.validate.result }}"
        echo ""
        
        if [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.validate.result }}" == "success" ]; then
          echo "✅ Все команды работают корректно!"
        else
          echo "⚠️ Некоторые проверки не прошли"
        fi
