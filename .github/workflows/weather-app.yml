name: WeatherEye CI/CD Pipeline - Full Command Support

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      command_group:
        description: '📋 Группа команд'
        required: true
        default: 'weather'
        type: choice
        options:
          - weather
          - favorites
          - settings
          - full_demo
      weather_command:
        description: '🌤️ Команда погоды'
        required: false
        default: 'now'
        type: choice
        options:
          - now
          - forecast
      city:
        description: '🏙️ Город'
        required: false
        default: 'Moscow'
        type: string
      forecast_days:
        description: '📅 Дней для прогноза (1-5)'
        required: false
        default: '3'
        type: string
      favorites_action:
        description: '⭐ Действие с избранным'
        required: false
        default: 'list'
        type: choice
        options:
          - list
          - add
          - remove
      favorites_city:
        description: '🏙️ Город для избранного'
        required: false
        default: 'Moscow'
        type: string
      settings_action:
        description: '⚙️ Действие с настройками'
        required: false
        default: 'show'
        type: choice
        options:
          - show
          - units
      units_value:
        description: '🌡️ Единицы измерения'
        required: false
        default: 'C'
        type: choice
        options:
          - C
          - F
  schedule:
    - cron: '0 */6 * * *'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
      shell: bash
    
    - name: Run unit tests
      run: python -m unittest discover -v
      continue-on-error: true

  weather_app:
    name: WeatherEye App Runner
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    # СОЗДАЕМ ДИРЕКТОРИЮ ДЛЯ ИЗБРАННОГО
    - name: Create favorites directory
      run: |
        echo "📁 Creating directory: ~/.weathereye/"
        mkdir -p ~/.weathereye/
        ls -la ~/ | grep .weathereye || echo "Directory created"
    
    # ЗАГРУЖАЕМ СОХРАНЕННОЕ ИЗБРАННОЕ
    - name: Download saved favorites
      uses: actions/download-artifact@v4
      continue-on-error: true
      id: download_favorites
      with:
        name: weathereye-favorites
        path: ~/.weathereye/
    
    # ПРОВЕРЯЕМ И ИНИЦИАЛИЗИРУЕМ ИЗБРАННОЕ
    - name: Check and initialize favorites
      run: |
        echo "📁 Checking favorites:"
        if [ -f ~/.weathereye/favorites.json ]; then
          echo "✅ Found existing favorites file"
          echo "Content:"
          cat ~/.weathereye/favorites.json
        else
          echo "📭 No favorites found, creating empty file"
          echo '{"cities": []}' > ~/.weathereye/favorites.json
        fi
        echo ""
    
    # ПОЛУЧАЕМ ВСЕ ПАРАМЕТРЫ
    - name: Set parameters
      id: params
      run: |
        echo "DAYS=${{ github.event.inputs.forecast_days }}" >> $GITHUB_ENV
        echo "CITY=${{ github.event.inputs.city }}" >> $GITHUB_ENV
        echo "UNITS=${{ github.event.inputs.units_value }}" >> $GITHUB_ENV
        echo "WEATHER_CMD=${{ github.event.inputs.weather_command }}" >> $GITHUB_ENV
        echo "FAV_ACTION=${{ github.event.inputs.favorites_action }}" >> $GITHUB_ENV
        echo "FAV_CITY=${{ github.event.inputs.favorites_city }}" >> $GITHUB_ENV
    
    # УСТАНАВЛИВАЕМ ЕДИНИЦЫ ИЗМЕРЕНИЯ
    - name: Set units
      run: |
        if [ "$UNITS" != "" ] && [ "$UNITS" != "C" ]; then
          echo "🔧 Setting units to $UNITS"
          python weather.py settings units "$UNITS"
        fi
    
    # ПОКАЗЫВАЕМ ТЕКУЩЕЕ СОСТОЯНИЕ
    - name: Show current state
      run: |
        echo "📊 Current State:"
        echo "-----------------"
        echo "⚙️ Settings:"
        python weather.py settings show
        echo ""
        echo "⭐ Favorites:"
        python weather.py favorites list
        echo ""
        echo "📅 Forecast days: $DAYS"
        echo ""
    
    # АВТО-ДЕМО РЕЖИМ (ДЛЯ PUSH/SCHEDULE)
    - name: Auto Demo Mode
      if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule'
      run: |
        echo "🎭 AUTO DEMO MODE"
        echo "================="
        echo ""
        
        echo "1. 🌤️ Current Weather"
        echo "------------------"
        python weather.py now Moscow
        python weather.py now London
        echo ""
        
        echo "2. 📅 Forecast ($DAYS days)"
        echo "------------------------"
        python weather.py forecast Moscow --days "$DAYS"
        python weather.py forecast London --days "$DAYS"
        echo ""
        
        echo "3. ⭐ Favorites Demo"
        echo "-------------------"
        echo "Current favorites:"
        python weather.py favorites list
        echo ""
        echo "Adding Moscow to favorites..."
        python weather.py favorites add Moscow
        echo "Updated favorites:"
        python weather.py favorites list
    
    # РУЧНОЙ РЕЖИМ (ДЛЯ WORKFLOW_DISPATCH)
    - name: Manual Mode - ${{ github.event.inputs.command_group }}
      if: github.event_name == 'workflow_dispatch'
      run: |
        echo "🎯 MANUAL MODE - $COMMAND_GROUP"
        echo "==============================="
        
        if [ "$COMMAND_GROUP" = "weather" ]; then
          echo "🌤️ Weather Command: $WEATHER_CMD for $CITY"
          echo "========================================="
          
          if [ "$WEATHER_CMD" = "now" ]; then
            python weather.py now "$CITY"
          else
            python weather.py forecast "$CITY" --days "$DAYS"
          fi
          
        elif [ "$COMMAND_GROUP" = "favorites" ]; then
          echo "⭐ Favorites Action: $FAV_ACTION $FAV_CITY"
          echo "========================================="
          
          echo "Before:"
          python weather.py favorites list
          echo ""
          
          if [ "$FAV_ACTION" = "list" ]; then
            python weather.py favorites list
          elif [ "$FAV_ACTION" = "add" ]; then
            python weather.py favorites add "$FAV_CITY"
            echo ""
            echo "✅ After adding $FAV_CITY:"
            python weather.py favorites list
          else
            python weather.py favorites remove "$FAV_CITY"
            echo ""
            echo "✅ After removing $FAV_CITY:"
            python weather.py favorites list
          fi
          
        elif [ "$COMMAND_GROUP" = "settings" ]; then
          echo "⚙️ Settings Action: $SETTINGS_ACTION"
          echo "====================================="
          
          if [ "$SETTINGS_ACTION" = "show" ]; then
            python weather.py settings show
          else
            python weather.py settings units "$UNITS"
            echo ""
            echo "✅ Updated settings:"
            python weather.py settings show
          fi
          
        elif [ "$COMMAND_GROUP" = "full_demo" ]; then
          echo "🎭 FULL DEMONSTRATION"
          echo "====================="
          echo ""
          
          echo "1. 🌤️ WEATHER DEMO"
          echo "------------------"
          if [ "$WEATHER_CMD" = "now" ]; then
            python weather.py now "$CITY"
          else
            python weather.py forecast "$CITY" --days "$DAYS"
          fi
          echo ""
          
          echo "2. ⭐ FAVORITES DEMO"
          echo "-------------------"
          echo "Current favorites:"
          python weather.py favorites list
          echo ""
          
          if [ "$FAV_ACTION" = "list" ]; then
            python weather.py favorites list
          elif [ "$FAV_ACTION" = "add" ]; then
            python weather.py favorites add "$FAV_CITY"
            echo "Updated favorites:"
            python weather.py favorites list
          else
            python weather.py favorites remove "$FAV_CITY"
            echo "Updated favorites:"
            python weather.py favorites list
          fi
          echo ""
          
          echo "3. ⚙️ SETTINGS DEMO"
          echo "------------------"
          python weather.py settings show
          if [ "$UNITS" != "" ] && [ "$UNITS" != "C" ]; then
            python weather.py settings units "$UNITS"
            echo "Updated settings:"
            python weather.py settings show
          fi
          echo ""
          
          echo "4. 📅 FORECAST DEMO ($DAYS days)"
          echo "------------------"
          python weather.py forecast Moscow --days "$DAYS"
          python weather.py forecast "$CITY" --days "$DAYS"
        fi
      env:
        COMMAND_GROUP: ${{ github.event.inputs.command_group }}
        WEATHER_CMD: ${{ github.event.inputs.weather_command }}
        CITY: ${{ github.event.inputs.city }}
        DAYS: ${{ github.event.inputs.forecast_days }}
        FAV_ACTION: ${{ github.event.inputs.favorites_action }}
        FAV_CITY: ${{ github.event.inputs.favorites_city }}
        SETTINGS_ACTION: ${{ github.event.inputs.settings_action }}
        UNITS: ${{ github.event.inputs.units_value }}
    
    # СОХРАНЯЕМ ИЗБРАННОЕ
    - name: Save favorites before upload
      run: |
        echo "💾 Current favorites before save:"
        python weather.py favorites list
        echo ""
        echo "File content:"
        cat ~/.weathereye/favorites.json || echo "No file"
    
    - name: Upload favorites artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: weathereye-favorites
        path: ~/.weathereye/
        retention-days: 90
        if-no-files-found: ignore
        compression-level: 6
    
    - name: Verify upload
      run: |
        echo "✅ Artifact upload completed"
        echo "Final favorites content:"
        cat ~/.weathereye/favorites.json || echo "No file"

  validate:
    name: Validate Commands
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
      shell: bash
    
    - name: Quick validation
      run: |
        echo "🔍 Quick validation..."
        python weather.py --help > /dev/null && echo "✅ Help OK"
        python weather.py now Moscow > /dev/null && echo "✅ Now OK" 
        python weather.py forecast Moscow --days 3 > /dev/null && echo "✅ Forecast OK"
        echo "✅ Validation complete"
      env:
        PYTHONIOENCODING: utf-8
