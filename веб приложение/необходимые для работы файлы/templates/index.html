<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherEye - Погода в любом городе</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 2;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-group select, .input-group button {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-group select {
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
            transform: translateY(-2px);
        }

        .options-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .option-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #e0e0e0;
        }

        .option-card h3 {
            margin-bottom: 15px;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .days-slider {
            width: 100%;
            margin: 15px 0;
        }

        .favorites-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            margin: 15px 0;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px;
        }

        .favorites-list li {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .favorites-list li:last-child {
            border-bottom: none;
        }

        .favorite-city {
            cursor: pointer;
            color: #4a5568;
            font-weight: 500;
        }

        .favorite-city:hover {
            color: #667eea;
        }

        .remove-fav {
            color: #f56565;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .remove-fav:hover {
            background: #fed7d7;
        }

        .result-area {
            background: #2d3748;
            color: #e2e8f0;
            padding: 25px;
            border-radius: 15px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 30px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #fc8181;
        }

        .success {
            color: #9ae6b4;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: #e2e8f0;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-weight: bold;
        }

        .tab.active {
            background: white;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .weather-icon {
            font-size: 2em;
            margin-right: 10px;
        }

        .temperature-large {
            font-size: 2.5em;
            font-weight: bold;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ WeatherEye</h1>
            <p>Узнай погоду в любой точке мира</p>
        </div>

        <div class="main-panel">
            <div class="tabs">
                <div class="tab active" onclick="showTab('weather')">🌤️ Погода</div>
                <div class="tab" onclick="showTab('favorites')">⭐ Избранное</div>
                <div class="tab" onclick="showTab('settings')">⚙️ Настройки</div>
            </div>

            <!-- Вкладка Погода -->
            <div id="weather-tab" class="tab-content active">
                <div class="input-group">
                    <input type="text" id="city-input" placeholder="Введите город (например: Moscow, London, Tokyo)" value="Moscow">
                    <select id="weather-type">
                        <option value="now">🌡️ Сейчас</option>
                        <option value="forecast">📅 Прогноз</option>
                    </select>
                    <button class="btn-primary" onclick="getWeather()">🔍 Получить</button>
                </div>

                <div id="forecast-options" style="display: none;" class="options-panel">
                    <div class="option-card">
                        <h3>📅 Дней прогноза</h3>
                        <input type="range" id="days-slider" class="days-slider" min="1" max="16" value="5">
                        <div style="display: flex; justify-content: space-between;">
                            <span>1 день</span>
                            <span id="days-value">5 дней</span>
                            <span>16 дней</span>
                        </div>
                    </div>
                </div>

                <div class="options-panel">
                    <div class="option-card">
                        <h3>🌡️ Единицы измерения</h3>
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="units" value="C" checked> Цельсий (°C)
                            </label>
                            <label>
                                <input type="radio" name="units" value="F"> Фаренгейт (°F)
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Вкладка Избранное -->
            <div id="favorites-tab" class="tab-content">
                <div class="input-group">
                    <input type="text" id="fav-city-input" placeholder="Название города">
                    <button class="btn-success" onclick="addToFavorites()">➕ Добавить</button>
                </div>
                <h3>⭐ Избранные города:</h3>
                <ul id="favorites-list" class="favorites-list">
                    <li style="text-align: center; color: #999;">Загрузка...</li>
                </ul>
            </div>

            <!-- Вкладка Настройки -->
            <div id="settings-tab" class="tab-content">
                <div class="options-panel">
                    <div class="option-card">
                        <h3>⚙️ Текущие настройки</h3>
                        <div id="settings-display">
                            <p>Загрузка...</p>
                        </div>
                        <button class="btn-primary" onclick="refreshSettings()" style="margin-top: 15px;">🔄 Обновить</button>
                    </div>
                </div>
            </div>

            <!-- Область результата -->
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <p>Загрузка данных...</p>
            </div>
            <div id="result" class="result-area">
                👋 Добро пожаловать! Введите город и нажмите "Получить"
            </div>
        </div>
    </div>

    <script>
        let currentUnits = 'C';

        // Показ вкладок
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            document.querySelector(`.tab:nth-child(${tabName === 'weather' ? 1 : tabName === 'favorites' ? 2 : 3})`).classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
            
            if (tabName === 'favorites') loadFavorites();
            if (tabName === 'settings') loadSettings();
        }

        // Обновление значения слайдера
        document.getElementById('days-slider')?.addEventListener('input', function(e) {
            document.getElementById('days-value').textContent = e.target.value + ' дней';
        });

        // Показ/скрытие опций прогноза
        document.getElementById('weather-type')?.addEventListener('change', function(e) {
            document.getElementById('forecast-options').style.display = 
                e.target.value === 'forecast' ? 'block' : 'none';
        });

        // Получение погоды
        async function getWeather() {
            const city = document.getElementById('city-input').value;
            const type = document.getElementById('weather-type').value;
            const units = document.querySelector('input[name="units"]:checked').value;
            const days = document.getElementById('days-slider')?.value || 5;
            
            if (!city) {
                showResult('❌ Введите название города');
                return;
            }

            showLoading(true);
            
            let endpoint = type === 'now' ? '/api/weather/now' : '/api/weather/forecast';
            let body = { city, units };
            if (type === 'forecast') body.days = days;

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                showResult(data.output);
            } catch (error) {
                showResult('❌ Ошибка соединения с сервером');
            } finally {
                showLoading(false);
            }
        }

        // Загрузка избранного
        async function loadFavorites() {
            try {
                const response = await fetch('/api/favorites/list');
                const data = await response.json();
                
                const list = document.getElementById('favorites-list');
                if (data.favorites && data.favorites.length > 0) {
                    list.innerHTML = data.favorites.map(city => `
                        <li>
                            <span class="favorite-city" onclick="useFavorite('${city}')">📌 ${city}</span>
                            <span class="remove-fav" onclick="removeFromFavorites('${city}')">❌</span>
                        </li>
                    `).join('');
                } else {
                    list.innerHTML = '<li style="text-align: center; color: #999;">Нет избранных городов</li>';
                }
            } catch (error) {
                console.error('Error loading favorites:', error);
            }
        }

        // Добавление в избранное
        async function addToFavorites() {
            const city = document.getElementById('fav-city-input').value;
            if (!city) {
                alert('Введите название города');
                return;
            }

            try {
                const response = await fetch('/api/favorites/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ city })
                });
                
                const data = await response.json();
                if (data.success) {
                    document.getElementById('fav-city-input').value = '';
                    await loadFavorites();
                    showResult(`✅ Город "${city}" добавлен в избранное`);
                } else {
                    showResult(data.output);
                }
            } catch (error) {
                showResult('❌ Ошибка при добавлении');
            }
        }

        // Удаление из избранного
        async function removeFromFavorites(city) {
            if (!confirm(`Удалить "${city}" из избранного?`)) return;

            try {
                const response = await fetch('/api/favorites/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ city })
                });
                
                const data = await response.json();
                if (data.success) {
                    await loadFavorites();
                    showResult(`🗑️ Город "${city}" удален из избранного`);
                } else {
                    showResult(data.output);
                }
            } catch (error) {
                showResult('❌ Ошибка при удалении');
            }
        }

        // Использовать город из избранного
        function useFavorite(city) {
            document.getElementById('city-input').value = city;
            showTab('weather');
            getWeather();
        }

        // Загрузка настроек
        async function loadSettings() {
            try {
                const response = await fetch('/api/settings/show');
                const data = await response.json();
                
                document.getElementById('settings-display').innerHTML = 
                    `<pre style="background: #2d3748; color: #e2e8f0; padding: 15px; border-radius: 10px;">${data.output}</pre>`;
            } catch (error) {
                document.getElementById('settings-display').innerHTML = 
                    '<p class="error">❌ Ошибка загрузки настроек</p>';
            }
        }

        // Обновить настройки
        function refreshSettings() {
            loadSettings();
        }

        // Показать результат
        function showResult(text) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = text.replace(/\n/g, '<br>');
        }

        // Показать/скрыть загрузку
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            // Загружаем избранное при старте
            loadFavorites();
            
            // Устанавливаем значение слайдера
            document.getElementById('days-value').textContent = 
                document.getElementById('days-slider').value + ' дней';
        });
    </script>
</body>
</html>
